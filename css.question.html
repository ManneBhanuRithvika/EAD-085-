<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Box Model Demo</title>
    <style>
        p {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .box {
            width: 250px;
            height: 120px;
            padding: 15px;                
            margin: 20px;                 
            border: 3px solid green;    
            background-color: lightyellow;
            text-align: center;
            display: inline-block;
            line-height: 120px;          
        }
            #mainBox {
            border-color: blue;           
            background-color: lightgray; 
        }
    </style>
    <link rel="stylesheet" href="style.css"> 

</head>
<body>

    <h1>CSS Box Model Demonstration</h1>
    <p>This is a paragraph styled using the element selector.</p>
    
    <div class="box">Class Selector Box</div>

    <div class="box" id="mainBox">ID Selector Box</div>

    <div class="box" style="border: 3px dashed red; background-color: #ffebcd;">
        Inline CSS Box
    </div>

</body>
</html>
