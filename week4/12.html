<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Layout</title>
    <link rel="stylesheet" href="12.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Responsive Webpage</h1>
    </header>

    <div class="content">
        <div class="column left">
            <h2>Left Column</h2>
            <p>
                This is the left column. On desktop, it appears on the left. On mobile, it stacks on top.
            </p>
        </div>

        <div class="column right">
            <h2>Right Column</h2>
            <p>
                This is the right column. On desktop, it appears on the right. On mobile, it stacks below the left column.
            </p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Responsive Webpage</p>
    </footer>
</div>

</body>
</html>
